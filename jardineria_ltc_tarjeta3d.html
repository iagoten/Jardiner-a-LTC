<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jardinería LTC - Tarjeta 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0; /* Cambia este color al fondo de tu web */
      font-family: Arial, sans-serif;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 20px;
      perspective: 1000px;
    }

    .card-wrap {
      width: 460px;
      height: 280px;
      transform-style: preserve-3d;
      transform: rotateY(-18deg) rotateX(8deg);
      cursor: pointer;
      filter: drop-shadow(0px 30px 45px rgba(0,0,0,0.38)) drop-shadow(0px 10px 18px rgba(0,0,0,0.22));
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .card-front {
      display: flex;
      flex-direction: column;
      background: #d8dbd5;
    }

    .card-back {
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-back-inner {
      color: #444;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .card-shine {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      pointer-events: none;
      z-index: 20;
      background: linear-gradient(125deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.0) 50%);
    }

    .top-section {
      flex: 1.15;
      background: linear-gradient(175deg, #f8f8f6 55%, #ddddd8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 16px 4px;
      position: relative;
    }

    .brand-jardineria {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: white;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1;
      -webkit-text-stroke: 2.5px #111;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.18);
      margin-bottom: -4px;
    }

    .logo-ltc {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 96px;
      font-weight: 900;
      color: white;
      line-height: 0.9;
      letter-spacing: -3px;
      -webkit-text-stroke: 4px #111;
      text-shadow: 5px 5px 0 rgba(0,0,0,0.18);
    }

    .bottom-section {
      flex: 1;
      background: linear-gradient(180deg, #b8d840 0%, #8ab818 55%, #5a8000 100%);
      position: relative;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    .grass-top {
      position: absolute;
      top: -2px;
      left: 0;
      right: 0;
      height: 20px;
      z-index: 2;
    }

    .tree-col {
      width: 90px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .info-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 22px 14px 10px 4px;
      z-index: 1;
    }

    .card-services {
      font-size: 11px;
      font-weight: bold;
      color: #1c3800;
      letter-spacing: 0.3px;
      line-height: 1.6;
      text-transform: uppercase;
    }

    .card-phone {
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      font-size: 26px;
      color: white;
      letter-spacing: 1px;
      margin-top: 5px;
      -webkit-text-stroke: 0.8px rgba(0,0,0,0.5);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.35);
    }

    .card-edge-right {
      position: absolute;
      right: -7px;
      top: 5px;
      bottom: 5px;
      width: 7px;
      background: linear-gradient(to right, #aaa, #777);
      transform: rotateY(90deg) translateZ(3.5px);
      transform-origin: left;
      border-radius: 0 2px 2px 0;
    }

    .card-edge-bottom {
      position: absolute;
      bottom: -5px;
      left: 5px;
      right: 5px;
      height: 5px;
      background: linear-gradient(to bottom, #aaa, #777);
      transform: rotateX(-90deg) translateZ(2.5px);
      transform-origin: top;
      border-radius: 0 0 2px 2px;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #999;
      padding: 16px 0 8px;
    }

    /* Responsive para móvil */
    @media (max-width: 520px) {
      .card-wrap {
        width: 320px;
        height: 195px;
      }
      .brand-jardineria { font-size: 22px; }
      .logo-ltc { font-size: 66px; }
      .card-services { font-size: 8px; }
      .card-phone { font-size: 18px; }
      .tree-col { width: 65px; }
    }
  </style>
</head>
<body>

<div class="scene" id="scene">
  <div class="card-wrap" id="card">
    <div class="card-face card-front">
      <div class="card-shine" id="shine"></div>

      <div class="top-section">
        <div class="brand-jardineria">Jardinería</div>
        <div class="logo-ltc">LTC</div>
      </div>

      <div class="bottom-section">
        <div class="grass-top">
          <svg viewBox="0 0 460 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <path d="M0,20 C5,8 10,14 15,6 C20,0 25,10 30,4 C35,0 40,12 46,5 C52,0 57,10 62,3 C67,0 72,11 78,5 C84,0 89,9 95,3 C101,0 106,10 112,4 C118,0 124,11 130,5 C136,0 141,9 147,3 C152,0 158,11 164,5 C170,0 175,10 181,4 C186,0 192,11 198,5 C203,0 209,10 215,4 C220,0 226,11 232,4 C237,0 243,10 249,4 C254,0 260,11 266,5 C272,0 277,10 283,4 C288,0 294,11 300,5 C305,0 311,10 317,4 C322,0 328,11 334,5 C339,0 345,10 351,4 C356,0 362,11 368,5 C373,0 379,10 385,4 C390,0 396,11 402,5 C407,0 413,10 419,4 C424,0 430,11 436,5 C441,0 447,10 453,4 C457,1 459,8 460,5 L460,20 Z" fill="#3a6800"/>
          </svg>
        </div>

        <div class="tree-col">
          <svg width="78" height="108" viewBox="0 0 78 108" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="39" cy="100" rx="32" ry="7" fill="#4a8000" opacity="0.5"/>
            <rect x="32" y="68" width="14" height="36" rx="4" fill="#6b3a10"/>
            <rect x="34" y="68" width="4" height="36" rx="2" fill="#8a4e18" opacity="0.5"/>
            <ellipse cx="39" cy="64" rx="30" ry="20" fill="#2d6e00"/>
            <ellipse cx="39" cy="48" rx="24" ry="18" fill="#3d8e00"/>
            <ellipse cx="39" cy="32" rx="18" ry="16" fill="#4daa00"/>
            <ellipse cx="39" cy="18" rx="12" ry="12" fill="#5cc400"/>
            <ellipse cx="30" cy="20" rx="5" ry="4" fill="#88e030" opacity="0.55"/>
            <ellipse cx="28" cy="38" rx="7" ry="5" fill="#88e030" opacity="0.4"/>
            <ellipse cx="26" cy="56" rx="6" ry="4" fill="#88e030" opacity="0.35"/>
          </svg>
        </div>

        <div class="info-col">
          <div class="card-services">
            Mantenimientos de jardines<br>
            Podas y desbroces
          </div>
          <div class="card-phone">TELF. 629 44 20 13</div>
        </div>
      </div>
    </div>

    <div class="card-face card-back">
      <div class="card-back-inner">Jardinería LTC</div>
    </div>

    <div class="card-edge-right"></div>
    <div class="card-edge-bottom"></div>
  </div>
</div>
<div class="hint">Mueve el ratón sobre la tarjeta para girarla</div>

<script>
  const card = document.getElementById('card');
  const scene = document.getElementById('scene');
  const shine = document.getElementById('shine');

  let baseX = 8, baseY = -18;
  let targetX = baseX, targetY = baseY;
  let currentX = baseX, currentY = baseY;

  scene.addEventListener('mousemove', (e) => {
    const rect = scene.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    targetY = baseY + dx * 24;
    targetX = baseX - dy * 15;
    const sx = 50 + dx * 30;
    const sy = 50 + dy * 30;
    shine.style.background = `radial-gradient(ellipse at ${sx}% ${sy}%, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.0) 65%)`;
  });

  scene.addEventListener('mouseleave', () => {
    targetX = baseX;
    targetY = baseY;
    shine.style.background = 'linear-gradient(125deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.0) 50%)';
  });

  function animate() {
    currentX += (targetX - currentX) * 0.1;
    currentY += (targetY - currentY) * 0.1;
    card.style.transform = `rotateY(${currentY}deg) rotateX(${currentX}deg)`;
    requestAnimationFrame(animate);
  }
  animate();
</script>

</body>
</html>
